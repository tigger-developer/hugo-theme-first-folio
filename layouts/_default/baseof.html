<html lang="{{ .Site.Language.Lang }}">
    {{- partial "header.html" . -}}
    <body class="{{ if eq .Params.layout "columns" }}columns-page{{ end }}{{ if .Site.Params.prereleaseKey }} prerelease-gate{{ end }}" data-grid-config='{{ .Scratch.Get "gridConfig" }}'>
        <div class="content">
        {{- partial "head.html" . -}}
        {{- block "main" . }}{{- end }}
        {{- partial "footer.html" . -}}
        </div>
        <script>
        /* Add data-lang to org-mode code blocks for language badge display */
        document.querySelectorAll('div.src[class*="src-"]').forEach(function(el) {
          var lang = Array.from(el.classList).find(function(c) { return c.startsWith('src-'); });
          if (lang) {
            el.classList.add('code-block');
            el.dataset.lang = lang.slice(4);
          }
        });
        </script>
    </body>
</html>
