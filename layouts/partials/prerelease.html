{{- /* ABOUTME: Pre-release gate — hides the page until the user enters the passphrase. */ -}}
{{- /* ABOUTME: Configured via params.prereleaseKey in hugo.yaml. Emits nothing when absent. */ -}}

{{- with .Site.Params.prereleaseKey -}}
{{- $hash := crypto.SHA256 . -}}
<style>html.prerelease-gating { opacity: 0 !important; pointer-events: none; }</style>
<script>
document.documentElement.classList.add('prerelease-gating');
(function() {
  var storedHash = '{{ $hash }}';
  var storageKey = 'prerelease-auth';

  function showPage() {
    document.documentElement.classList.remove('prerelease-gating');
  }

  function hashInput(input) {
    var encoder = new TextEncoder();
    var data = encoder.encode(input);
    return crypto.subtle.digest('SHA-256', data).then(function(buf) {
      return Array.from(new Uint8Array(buf)).map(function(b) {
        return b.toString(16).padStart(2, '0');
      }).join('');
    });
  }

  function gate() {
    if (localStorage.getItem(storageKey) === 'true') {
      showPage();
      return;
    }
    var passphrase = prompt('This site is not yet public. Enter passphrase:');
    if (!passphrase) { window.location = 'about:blank'; return; }
    hashInput(passphrase).then(function(inputHash) {
      if (inputHash === storedHash) {
        localStorage.setItem(storageKey, 'true');
        showPage();
      } else {
        window.location = 'about:blank';
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', gate);
  } else {
    gate();
  }
})();
</script>
{{- end -}}
