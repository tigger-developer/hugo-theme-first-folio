{{/* ABOUTME: Inline shortcode that wraps content in a span with lang="ga" for Irish language text. */}}
{{/* ABOUTME: Triggers :lang(ga) CSS rule to apply Iosevka Gaeilge font. */}}
{{/* Usage: {{< ga >}}Dia duit, a chara{{< /ga >}} */}}
<span lang="ga">{{ .Inner }}</span>
