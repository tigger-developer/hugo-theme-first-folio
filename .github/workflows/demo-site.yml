# ABOUTME: Build the exampleSite with Hugo and deploy to GitHub Pages.
# ABOUTME: Uses the theme-demo-live environment for production baseURL.
name: Deploy demo site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Install Hugo and ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y hugo ffmpeg

      - name: Build exampleSite
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: theme-demo-live
        run: make build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
