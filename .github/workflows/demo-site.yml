# ABOUTME: Build the exampleSite with Hugo and deploy to GitHub Pages.
# ABOUTME: Uses the theme-demo-live environment for production baseURL.
name: Deploy demo site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify committed media metadata
        run: make verify-audiobook-metadata

      - name: Build exampleSite
        env:
          HUGO_ENVIRONMENT: theme-demo-live
          HUGO_IMAGE: hugomods/hugo:debian-0.161.1@sha256:b65563ec4d103289c6c1e0a26875036bad780702b2613825f8d4c02f63c7711a
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e HUGO_CACHEDIR=/tmp/hugo_cache \
            -e HUGO_ENVIRONMENT="$HUGO_ENVIRONMENT" \
            "$HUGO_IMAGE" \
            hugo --source exampleSite --destination public --environment "$HUGO_ENVIRONMENT" --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
