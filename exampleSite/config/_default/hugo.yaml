# ABOUTME: Hugo configuration for the First Folio theme example site
# ABOUTME: Demonstrates all major theme features with fictional content

baseURL: https://example.com/
locale: en-GB-oed
title: red.dots.innit

module:
  imports:
    - path: github.com/tadg-paul/hugo-theme-first-folio

copyright: "© 2023-2026 Taḋg Paul — Apache License 2.0"

pagination:
  pagerSize: 12

imaging:
  quality: 85
  resampleFilter: "CatmullRom"
  exif:
    disableDate: false
    disableLatLong: true


params:
  # prereleaseKey: testpass
  # Colour mode
  ambience:
    default: dark         # auto | light | dark
    toggle: true          # show light/dark toggle button

  # Background image defaults (all image-over-text contexts fall back to these)
  bgImage:
    opacity: 0.7          # image opacity (0.0-1.0, lower = darker)
    blur: 2px             # image blur

  # Carousel
  carousel:
    interval: 6
    showAuthor: true
    bgImage:
      opacity: 0.9
      blur: 0px
    title:
      wash:
        opacity: 0.2     # title wash tint strength
        blur: 3px           # title wash backdrop blur
        gradientV: 10%    # vertical gradient fade at edges
        gradientH: 20%     # horizontal gradient fade at edges
    description:
      wash:
        opacity: 0.3
        gradient: 50%
        coverage: 35%
        blur: 5px
 
  # Masonry card image and wash
  cardImage:
    opacity: 0.9
    showAuthor: false
    blur: 2px
    title:
      wash:
        opacity: 0.1     # title wash tint strength
        blur: 3px           # title wash backdrop blur
        gradientV: 10%    # vertical gradient fade at edges
        gradientH: 20%     # horizontal gradient fade at edges
    description:
      wash:
        opacity: 0.35         # footer scrim max opacity
        gradient: 50%
        coverage: 50%
        blur: 5px

  # Gallery card wash
  cardGalleryImage:
    title:
      wash:
        opacity: 0.1     # title wash tint strength
        blur: 3px           # title wash backdrop blur
        gradientV: 10%    # vertical gradient fade at edges
        gradientH: 20%     # horizontal gradient fade at edges
    description:
      wash:
        opacity: 0.35
        gradient: 50%
        coverage: 20%
        blur: 5px



  # Background-layout article wash
  wash:
    opacity: 0.35
    blur: 0px
    gradient: "0% 10% 0% 10%"

  # Banner title wash
  banner:
    wash:
      opacity: 0.3
      blur: 2px
      gradient: "20% 30% 20% 30%"

  headingPrefix:
    card: "✱"         # prefix for masonry cards and gallery cards
    carousel: "✱"     # prefix for carousel cards
    list: "✱"         # prefix for article titles in list views (home, section, taxonomy)
    sectionTitle: "#"  # prefix for section titles (e.g. "Recipes")
    page: "#"         # prefix for article titles on individual pages
    h1: "✱"           # prefix for H1 headings
    h2: "✱"           # prefix for H2 headings
    h3: "✱"           # prefix for H3 headings
    h4: "✱"           # prefix for H4 headings
    h5: "✱"           # prefix for H5 headings
    h6: "✱"           # prefix for H6 headings

  # Read more button
  readMore:
    type: icon
    value: icons/chevron-right-duo-thick-white.svg

  dateFormat: "2 January 2006"
  dateFormatShort: "02/01/26"

  mainSections:
    - recipes
    - journal
    - photography
    - stories
    - poetry

  useCDN: false

  contentMaxWidth: 80rem          # max content area width (article body and grid)

  grid:
    sidebarWidth: 15rem           # sidebar column width at desktop
    sidebarWidthNarrow: 12rem     # sidebar column width at tablet
    gap: 1.5rem                   # grid gap between items
    breakpoints:
      sm: 30em                    # small / mobile
      md: 48em                    # medium / tablet
      lg: 64em                    # large / desktop
      xl: 80em                    # extra large / wide desktop
    columns:
      sm: 2                       # columns at small breakpoint
      md: 2                       # columns at medium breakpoint
      lg: 3                       # columns at large breakpoint
      xl: 4                       # columns at extra large breakpoint

  social:
    - name: BlueSky
      icon: "simple:bluesky"                        # Simple Icons (simple: prefix)
      url: https://bsky.app/profile/example
    - name: GitHub
      icon: github                                   # Feather icon (default)
      url: https://github.com/tadg-paul/hugo-theme-first-folio
    - name: Mastodon
      icon: "simple:mastodon"                        # Simple Icons
      url: https://mastodon.social/@example
    - name: RSS
      icon: rss                                      # Feather icon
      url: /index.xml

  subtitle: "A demo of the [First Folio](https://github.com/tadg-paul/hugo-theme-first-folio) theme. All content and authors are fictitious."

menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: Recipes
      url: /recipes/
      weight: 10
    - name: Journal
      url: /journal/
      weight: 20
    - name: Photography
      url: /photography/
      weight: 30
    - name: Stories
      url: /stories/
      weight: 40
    - name: Poetry
      url: /poetry/
      weight: 45
    - name: Profile
      url: /profile/
      weight: 48
    - name: Tags
      url: /tags/
      weight: 50

taxonomies:
  tag: tags

mediaTypes:
  application/rss+xml:
    suffixes:
      - xml

outputFormats:
  podcast:
    mediaType: application/rss+xml
    baseName: feed
    isPlainText: false
    noUgly: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: true
    style: monokai
