# ABOUTME: Hugo configuration for the First Folio theme example site
# ABOUTME: Demonstrates all major theme features with fictional content

baseURL: https://example.com/
locale: en-GB-oed
title: red-dots.example.com

module:
  imports:
    - path: github.com/tadg-paul/hugo-theme-first-folio

copyright: "© 2023-2026 Taḋg Paul — Apache License 2.0"

pagination:
  pagerSize: 12

imaging:
  quality: 85
  resampleFilter: "CatmullRom"
  exif:
    disableDate: false
    disableLatLong: true


params:
  # Colour mode
  ambience:
    default: dark         # auto | light | dark
    toggle: true          # show light/dark toggle button

  # Background image defaults (all image-over-text contexts fall back to these)
  bgImage:
    opacity: 0.7          # image opacity (0.0-1.0, lower = darker)
    blur: 2px             # image blur

  # Carousel
  carousel:
    interval: 6
    bgImage:
      opacity: 0.9
      blur: 0px
    title:
      wash:
        opacity: 0.2     # title wash tint strength
        blur: 5px           # title wash backdrop blur
        gradientV: 10%    # vertical gradient fade at edges
        gradientH: 10%     # horizontal gradient fade at edges
    description:
      wash:
        opacity: 0.3
        gradient: 50%
        coverage: 35%
        blur: 5px
 
  # Masonry card image and wash
  cardImage:
    opacity: 0.9
    blur: 2px
    title:
      wash:
        opacity: 0.2     # title wash tint strength
        blur: 5px           # title wash backdrop blur
        gradientV: 10%    # vertical gradient fade at edges
        gradientH: 10%     # horizontal gradient fade at edges
    description:
      wash:
        opacity: 0.35         # footer scrim max opacity
        gradient: 50%
        coverage: 50%
        blur: 5px

  # Gallery card wash
  cardGalleryImage:
    title:
      wash:
        opacity: 0.2     # title wash tint strength
        blur: 5px           # title wash backdrop blur
        gradientV: 10%    # vertical gradient fade at edges
        gradientH: 10%     # horizontal gradient fade at edges
    description:
      wash:
        opacity: 0.35
        gradient: 50%
        coverage: 20%
        blur: 5px



  # Background-layout article wash
  wash:
    opacity: 0.25
    blur: 0px
    gradient: "0% 10% 0% 10%"

  # Banner title wash
  banner:
    wash:
      opacity: 0.3
      blur: 2px
      gradient: "20% 30% 20% 30%"

  # Heading prefixes
  headingPrefix:
    card: "›"
    carousel: "›"
    list: ""
    page: "›"
    h1: "›"
    h2: "»"
    h3: "›"
    h4: "›"
    h5: "›"
    h6: "›"

  # Read more button
  readMore:
    type: icon
    value: icons/chevron-right-duo-thick-white.svg

  dateFormat: "2 January 2006"
  dateFormatShort: "02/01/26"

  mainSections:
    - recipes
    - journal
    - photography
    - stories
    - poetry

  useCDN: false

  grid:
    contentMaxWidth: 100rem
    sidebarWidth: 12rem
    sidebarWidthNarrow: 12rem
    gap: 1.5rem
    breakpoints:
      sm: 30em
      md: 48em
      lg: 64em
      xl: 80em
    columns:
      sm: 2
      md: 3
      lg: 4
      xl: 5

  social:
    - name: BlueSky
      icon: "simple:bluesky"                        # Simple Icons (simple: prefix)
      url: https://bsky.app/profile/example
    - name: GitHub
      icon: github                                   # Feather icon (default)
      url: https://github.com/tadg-paul/hugo-theme-first-folio
    - name: Mastodon
      icon: "simple:mastodon"                        # Simple Icons
      url: https://mastodon.social/@example
    - name: RSS
      icon: rss                                      # Feather icon
      url: /index.xml

  subtitle: "A demo site for the First Folio Hugo theme"

menu:
  main:
    - name: Recipes
      url: /recipes/
      weight: 10
    - name: Journal
      url: /journal/
      weight: 20
    - name: Photography
      url: /photography/
      weight: 30
    - name: Stories
      url: /stories/
      weight: 40
    - name: Poetry
      url: /poetry/
      weight: 45
    - name: Tags
      url: /tags/
      weight: 50

taxonomies:
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: true
    style: monokai
