# First Folio Hugo Theme

name = "First Folio"
license = "Apache-2.0"
licenselink = "https://github.com/tadg-paul/hugo-theme-first-folio/blob/main/LICENSE"
description = "A versatile Hugo theme for sites that do many things — galleries, blogs, poetry, plays, recipes, tech docs — without any section feeling like an afterthought."
homepage = "https://github.com/tadg-paul/hugo-theme-first-folio"
demosite = "https://first-folio.theme.lobb.ie/"
tags = ["blog", "portfolio", "gallery", "poetry", "responsive", "masonry", "multi-section", "shortcodes", "dark", "video", "cloudflare-stream"]
features = [
  "Masonry grid with carousel card",
  "Image galleries with lightbox and EXIF metadata",
  "Six article layouts (banner, hero, columns, featured, background, text-only)",
  "18 custom shortcodes",
  "Cloudflare Stream video support",
  "Breadcrumb navigation and signpost CTAs",
  "Table of contents sidebar",
  "Responsive design with em-based breakpoints (WCAG 2.1)",
  "Dark mode design"
]
min_version = "0.128.0"

[author]
  name = "Taḋg Paul"
  homepage = "https://tadg.ie"
